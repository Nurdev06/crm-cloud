name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Pytest
        env:
          APP_ENV: testing
          DATABASE_URL: sqlite+aiosqlite:///:memory:
        run: |
          cd backend
          pytest --maxfail=3 --disable-warnings

  frontend-test-and-build:
    name: Frontend Lint, Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

      - name: TypeScript Typecheck
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build Production Bundle
        run: |
          cd frontend
          npm run build

  docker-build:
    name: Build Docker Images
    needs: [backend-test, frontend-test-and-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: clothcrm-backend:latest

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: clothcrm-frontend:latest

  deploy:
    name: Deploy to EC2 Server
    needs: [backend-test, frontend-test-and-build, docker-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: SSH into server and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Clean Docker cache to free up space on full disk
            docker system prune -f || true
            
            # Clone repository if it doesn't exist, otherwise pull latest changes
            if [ ! -d "$HOME/CRM" ]; then
              git clone https://github.com/Nurdev06/crm-cloud.git "$HOME/CRM"
            else
              cd "$HOME/CRM"
              git pull origin main
            fi
            
            cd "$HOME/CRM"
            
            # Ensure .env exists
            if [ ! -f ".env" ]; then
              cp .env.example .env
            fi
            
            # Restart services with docker-compose
            docker compose down || true
            docker compose up -d --build
            
            # Seeding (creating tables and mock data)
            docker compose exec -T backend python seed.py || true

